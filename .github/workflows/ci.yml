name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Japanese Terminology Check
        run: npm run test:ja-terms

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start App
        run: |
          nohup npm run dev -- --port 3000 > /tmp/broker-desk-dev.log 2>&1 &
          echo $! > /tmp/broker-desk-dev.pid

      - name: Wait for Health Endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/api/health/data" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "[FAIL] app did not become healthy in time"
          cat /tmp/broker-desk-dev.log
          exit 1

      - name: Regression Check
        run: BASE_URL=http://127.0.0.1:3000 npm run test:regression

      - name: Stop App
        if: always()
        run: |
          if [ -f /tmp/broker-desk-dev.pid ]; then
            kill "$(cat /tmp/broker-desk-dev.pid)" || true
          fi
